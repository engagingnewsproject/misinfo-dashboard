# Firebase App Hosting configuration for misinfo-dashboard (Next.js)
# See: https://firebase.google.com/docs/app-hosting/configure

# Optional: Cloud Run service tuning (defaults are usually fine)
# runConfig:
#   minInstances: 0
#   maxInstances: 100
#   concurrency: 80
#   memoryMiB: 512
#   cpu: 1

env:
  # --- Public env (NEXT_PUBLIC_* available at BUILD and RUNTIME) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAsGCi7VgxuovHAbY4tRDAKDRN6sxw8MHo"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "misinfo-5d004.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "misinfo-5d004"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "misinfo-5d004.appspot.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "2581605663"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:2581605663:web:5c1f1a43d80568fd5b542a"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-L4GJJGV0V1"
    availability:
      - BUILD
